<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Affirm Agentic Commerce Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Google+Sans:wght@400;500;700&display=swap');

:root {
  --bg:#07071a; --surface:#0e0e24; --card:#141432; --border:rgba(255,255,255,.07);
  --text:#f2f2f8; --tsec:#9090ae; --tdim:#5c5c78; --indigo:#4a4af4; --indigo-lt:#6e6ef8;
  --green:#00d68f; --priceline-blue:#0546b6; --priceline-dark:#012555;
  --gemini-bg:#1a1a2e; --gemini-surface:#202040;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:#000;color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* Scene nav */
.scene-nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.08);padding:12px 0}
.scene-tabs{display:flex;justify-content:center;gap:4px;max-width:500px;margin:0 auto;padding:0 16px}
.scene-tab{padding:8px 16px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;color:var(--tsec);border:1px solid transparent;transition:all .2s;white-space:nowrap}
.scene-tab.on{background:var(--indigo);color:white;border-color:var(--indigo)}
.scene-tab:hover:not(.on){border-color:rgba(255,255,255,.15);color:var(--text)}
.scene-label{text-align:center;font-size:10px;color:var(--tdim);margin-top:6px;letter-spacing:1px;text-transform:uppercase}

/* Scenes */
.scene{display:none;max-width:430px;margin:0 auto;min-height:100vh;padding-top:72px}
.scene.on{display:block}

/* ═══ SCENE 1: PRICELINE ═══ */
.pl-header{background:var(--priceline-dark);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--priceline-blue)}
.pl-logo{font-size:20px;font-weight:700;color:white;display:flex;align-items:center;gap:8px}
.pl-logo svg{display:block}
.pl-badge{font-size:10px;background:var(--priceline-blue);padding:3px 8px;border-radius:4px;color:white;font-weight:600}
.pl-chat{background:#0a1628;padding:16px;min-height:calc(100vh - 150px);display:flex;flex-direction:column;gap:12px}
.pl-msg{max-width:85%;padding:14px 18px;border-radius:16px;font-size:14px;line-height:1.6;animation:pop .3s ease}
.pl-msg.bot{background:#0f1f3a;border:1px solid rgba(5,70,182,.3);align-self:flex-start;border-bottom-left-radius:4px}
.pl-msg.user{background:var(--priceline-blue);align-self:flex-end;border-bottom-right-radius:4px}
.pl-deal{background:#0f1f3a;border:1px solid rgba(5,70,182,.3);border-radius:16px;padding:16px;align-self:flex-start;max-width:90%;animation:pop .3s ease}
.pl-deal-title{font-size:15px;font-weight:700;margin-bottom:10px}
.pl-deal-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,.06)}
.pl-deal-row:last-child{border:none}
.pl-deal-label{color:var(--tsec)}
.pl-affirm-offer{margin-top:14px;padding:14px 16px;background:rgba(74,74,244,.08);border:1px solid rgba(74,74,244,.25);border-radius:12px;cursor:pointer;transition:all .2s}
.pl-affirm-offer:hover{background:rgba(74,74,244,.15);border-color:var(--indigo)}
.pl-affirm-badge{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.pl-affirm-logo{font-size:14px;font-weight:800;color:var(--indigo-lt)}
.pl-affirm-tag{font-size:9px;background:var(--indigo);color:white;padding:2px 6px;border-radius:4px;font-weight:600}
.pl-affirm-terms{font-size:14px;font-weight:600}
.pl-affirm-sub{font-size:11px;color:var(--tsec);margin-top:4px}

/* ═══ SCENE 2: GEMINI ═══ */
.gm-header{background:#1a1a2e;padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.06)}
.gm-logo{display:flex;align-items:center;gap:8px}
.gm-logo-icon{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#4285f4,#ea4335,#fbbc05,#34a853);display:flex;align-items:center;justify-content:center}
.gm-logo-text{font-size:18px;font-weight:500;color:white;font-family:'Google Sans',Inter,sans-serif}
.gm-body{background:var(--gemini-bg);padding:16px;min-height:calc(100vh - 140px);display:flex;flex-direction:column;gap:12px}
.gm-msg{max-width:88%;padding:14px 18px;border-radius:18px;font-size:14px;line-height:1.6;animation:pop .3s ease}
.gm-msg.bot{background:var(--gemini-surface);align-self:flex-start;border-bottom-left-radius:4px}
.gm-msg.user{background:#2d4a7a;align-self:flex-end;border-bottom-right-radius:4px}
.gm-results{align-self:flex-start;max-width:92%;animation:pop .3s ease}
.gm-result{background:var(--gemini-surface);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.gm-result:hover{border-color:rgba(66,133,244,.4)}
.gm-result-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.gm-result-name{font-size:15px;font-weight:600;flex:1}
.gm-result-price{font-size:15px;font-weight:700;color:#4285f4}
.gm-result-desc{font-size:12px;color:var(--tsec);line-height:1.5;margin-bottom:10px}
.gm-affirm{display:flex;align-items:center;gap:8px;padding:10px 12px;background:rgba(74,74,244,.08);border-radius:8px;border:1px solid rgba(74,74,244,.2)}
.gm-affirm-logo{font-size:12px;font-weight:800;color:var(--indigo-lt)}
.gm-affirm-text{font-size:12px;color:var(--green);font-weight:600}

/* ═══ SCENE 3: AFFIRM APP ═══ */
.af-header{padding:8px 20px 0;display:flex;justify-content:space-between;align-items:center}
.af-logo{font-size:24px;font-weight:800;color:white}
.af-pp{text-align:center;padding:24px 20px 20px}
.af-pp-label{font-size:14px;color:var(--tsec);margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:6px}
.af-pp-val{font-size:48px;font-weight:800;letter-spacing:-2px}
.af-trip-banner{margin:0 20px 16px;padding:16px 20px;background:rgba(74,74,244,.08);border:1px solid rgba(74,74,244,.2);border-radius:16px}
.af-trip-title{font-size:15px;font-weight:700;margin-bottom:4px}
.af-trip-sub{font-size:12px;color:var(--tsec)}
.af-trip-items{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.af-trip-item{padding:6px 12px;background:var(--card);border:1px solid var(--border);border-radius:100px;font-size:11px;font-weight:500;display:flex;align-items:center;gap:4px}
.af-trip-item.done{color:var(--green);border-color:rgba(0,214,143,.2)}
.af-chat-area{background:var(--surface);margin:0 14px;border-radius:20px;padding:16px;border:1px solid var(--border)}
.af-chat-msgs{display:flex;flex-direction:column;gap:10px;max-height:400px;overflow-y:auto;scrollbar-width:none;margin-bottom:12px}
.af-chat-msgs::-webkit-scrollbar{display:none}
.af-chat-input{display:flex;gap:10px;align-items:center}
.af-input{flex:1;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:100px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
.af-input:focus{border-color:var(--indigo)}
.af-input::placeholder{color:var(--tdim)}
.af-send{width:38px;height:38px;background:var(--indigo);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:white;flex-shrink:0}

/* Shared */
@keyframes pop{from{opacity:0;transform:translateY(6px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.dots-a{display:flex;gap:5px;padding:14px 18px;border-radius:18px;border-bottom-left-radius:4px;animation:pop .3s ease;align-self:flex-start}
.dots-a.pl-style{background:#0f1f3a;border:1px solid rgba(5,70,182,.3)}
.dots-a.gm-style{background:var(--gemini-surface)}
.dots-a.af-style{background:#111128;border:1px solid rgba(74,74,244,.12)}
.da{width:7px;height:7px;background:var(--tsec);border-radius:50%;animation:bnc 1.2s infinite}
.da:nth-child(2){animation-delay:.15s}.da:nth-child(3){animation-delay:.3s}
@keyframes bnc{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}

.pill-row{display:flex;gap:8px;flex-wrap:wrap;align-self:flex-start;animation:pop .3s ease}
.pill-btn{padding:10px 16px;background:var(--card);border:1px solid var(--border);border-radius:100px;font-size:12px;font-weight:500;color:var(--text);cursor:pointer;transition:all .2s}
.pill-btn:hover{border-color:var(--indigo);color:var(--indigo-lt)}
.pill-btn.pl-style{background:#0f1f3a;border-color:rgba(5,70,182,.2)}
.pill-btn.pl-style:hover{border-color:var(--priceline-blue)}
.pill-btn.gm-style{background:var(--gemini-surface);border-color:rgba(255,255,255,.08)}
.pill-btn.gm-style:hover{border-color:#4285f4}

/* Gate */
.gate{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center}
.gate.out{opacity:0;pointer-events:none;transition:opacity .4s}
.gate-box{text-align:center;width:300px}
.gate-logo{font-size:32px;font-weight:800;color:white;margin-bottom:6px}
.gate-sub{font-size:14px;color:var(--tsec);margin-bottom:32px}
.gate-input{width:100%;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;font-family:inherit;outline:none;text-align:center;letter-spacing:2px}
.gate-input:focus{border-color:var(--indigo)}
.gate-input::placeholder{color:var(--tdim);letter-spacing:0}
.gate-btn{margin-top:14px;width:100%;padding:14px;background:var(--indigo);border:none;border-radius:12px;color:white;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer}
.gate-err{margin-top:14px;font-size:13px;color:#f04;min-height:18px}

/* Checkout sheet */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.65);opacity:0;pointer-events:none;transition:opacity .3s;z-index:200}
.ov.on{opacity:1;pointer-events:all}
.sh{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:430px;background:#0e0e24;border-radius:24px 24px 0 0;padding:20px 20px 44px;transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:201;border-top:1px solid rgba(255,255,255,.1)}
.sh.on{transform:translateX(-50%) translateY(0)}
.sh-handle{width:40px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;margin:0 auto 20px}
.sh-prod{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.sh-nm{font-size:16px;font-weight:700}
.sh-pr{font-size:14px;color:var(--tsec)}
.plan-bx{background:var(--card);border:2px solid var(--indigo);border-radius:14px;padding:18px;margin-bottom:16px}
.plan-r{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:15px}
.plan-r:last-child{margin-bottom:0}
.det-r{display:flex;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border);font-size:14px}
.det-r:last-of-type{border-bottom:none}
.det-l{color:var(--tsec)}
.cfm-btn{margin-top:20px;width:100%;padding:18px;background:var(--indigo);border:none;border-radius:100px;color:white;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px}

.suc{align-self:flex-start;max-width:88%;background:rgba(0,214,143,.08);border:1px solid rgba(0,214,143,.2);border-radius:14px;padding:14px 18px;animation:pop .3s ease}
.suc-t{font-size:13px;font-weight:700;color:var(--green);margin-bottom:4px}
.suc-b{font-size:12px;line-height:1.5}

/* Scene 3: Affirm App (iframe) */
#s3 iframe{background:var(--bg)}
</style>
</head>
<body>

<!-- Gate -->
<div class="gate" id="gate">
  <div class="gate-box">
    <div class="gate-logo">affirm</div>
    <div class="gate-sub">Agentic Commerce Demo</div>
    <input class="gate-input" id="gateInput" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')unlock()">
    <button class="gate-btn" onclick="unlock()">Continue</button>
    <div class="gate-err" id="gateErr"></div>
  </div>
</div>

<div id="app" style="display:none">

<!-- Scene nav -->
<div class="scene-nav">
  <div class="scene-tabs">
    <div class="scene-tab on" onclick="showScene(1)">1. Priceline</div>
    <div class="scene-tab" onclick="showScene(2)">2. Gemini</div>
    <div class="scene-tab" onclick="showScene(3)">3. Affirm App</div>
  </div>
  <div class="scene-label">Amanda's Orlando Trip</div>
</div>

<!-- SCENE 1: PRICELINE -->
<div class="scene on" id="s1">
  <div class="pl-header">
    <div class="pl-logo">
      <svg width="24" height="24" fill="none"><rect width="24" height="24" rx="4" fill="var(--priceline-blue)"/><text x="5" y="17" font-size="14" font-weight="800" fill="white">P</text></svg>
      priceline
    </div>
    <div class="pl-badge">AI Assistant</div>
  </div>
  <div class="pl-chat" id="pl-chat"></div>
</div>

<!-- SCENE 2: GEMINI -->
<div class="scene" id="s2">
  <div class="gm-header">
    <div class="gm-logo">
      <div class="gm-logo-icon"><svg width="16" height="16" fill="none"><path d="M8 2l2 4 4 2-4 2-2 4-2-4-4-2 4-2z" fill="white"/></svg></div>
      <span class="gm-logo-text">Gemini</span>
    </div>
  </div>
  <div class="gm-body" id="gm-chat"></div>
</div>

<!-- SCENE 3: AFFIRM APP (iframe of working index.html) -->
<div class="scene" id="s3" style="padding-top:0">
  <iframe id="af-frame" src="index.html#skipgate" style="width:100%;height:calc(100vh - 56px);border:none;margin-top:-16px"></iframe>
</div>

</div>

<!-- Checkout -->
<div class="ov" id="ov" onclick="cs()"></div>
<div class="sh" id="sh">
  <div class="sh-handle"></div>
  <div class="sh-prod"><div><div class="sh-nm" id="sN"></div><div class="sh-pr" id="sP"></div></div></div>
  <div class="plan-bx">
    <div class="plan-r"><span id="sPl"></span><span style="color:var(--tsec)">&#9662;</span></div>
    <div class="plan-r"><span>$0 due today</span><span style="font-weight:700;color:var(--green)">0% APR</span></div>
  </div>
  <div class="det-r"><span class="det-l">Payment method</span><span>Debit &#8226;&#8226;&#8226;&#8226; 1234</span></div>
  <div class="det-r"><span class="det-l">Interest</span><span>$0.00</span></div>
  <div class="det-r"><span class="det-l">Total</span><span id="sT"></span></div>
  <button class="cfm-btn" id="cfmBtn" onclick="confirmCurrent()">Slide to confirm &rarr;</button>
</div>

<script>
const D=ms=>new Promise(r=>setTimeout(r,ms));
let currentCheckoutScene=null, ppVal=2000;

// ─── AUTH ───
const PH='f613d7f4426e7eeb12ca33afaf9663940a8a028e99dc0b706d614230cb51f63a';
async function sha256(s){const d=new TextEncoder().encode(s);const h=await crypto.subtle.digest('SHA-256',d);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');}
async function unlock(){const v=document.getElementById('gateInput').value;if(!v){document.getElementById('gateErr').textContent='Please enter a password';return;}const h=await sha256(v);if(h===PH){sessionStorage.setItem('affirm_demo','1');document.getElementById('gate').classList.add('out');document.getElementById('app').style.display='';setTimeout(()=>{document.getElementById('gate').remove();initScene1();},400);}else{document.getElementById('gateErr').textContent='Incorrect password';document.getElementById('gateInput').value='';}}
if(sessionStorage.getItem('affirm_demo')==='1'){document.getElementById('gate').remove();document.getElementById('app').style.display='';setTimeout(initScene1,300);}else{document.getElementById('gateInput').focus();}

// ─── SCENES ───
function showScene(n){
  document.querySelectorAll('.scene').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.scene-tab').forEach((t,i)=>t.classList.toggle('on',i===n-1));
  document.getElementById('s'+n).classList.add('on');
  if(n===1&&!document.getElementById('pl-chat').children.length)initScene1();
  if(n===2&&!document.getElementById('gm-chat').children.length)initScene2();
  if(n===3&&!document.getElementById('af-chat').children.length)initScene3();
}

// ─── HELPERS ───
function addTo(cid,html,cls){const d=document.createElement('div');d.className=cls;d.innerHTML=html;document.getElementById(cid).appendChild(d);document.getElementById(cid).scrollTop=99999;}
function dotsIn(cid,style){const d=document.createElement('div');d.className='dots-a '+style;d.id='dots-'+cid;d.innerHTML='<div class="da"></div><div class="da"></div><div class="da"></div>';document.getElementById(cid).appendChild(d);document.getElementById(cid).scrollTop=99999;}
function dotsOut(cid){const d=document.getElementById('dots-'+cid);if(d)d.remove();}
function pillsTo(cid,items,style,handler){const d=document.createElement('div');d.className='pill-row';d.innerHTML=items.map(t=>`<span class="pill-btn ${style}" onclick="${handler}('${t.replace(/'/g,"\\'")}')">${t}</span>`).join('');document.getElementById(cid).appendChild(d);document.getElementById(cid).scrollTop=99999;}

function openSheet(name,price,mo){
  currentCheckoutScene=null;
  document.getElementById('sN').textContent=name;
  document.getElementById('sP').textContent='$'+price;
  document.getElementById('sT').textContent='$'+price+'.00';
  document.getElementById('sPl').innerHTML=mo>0?`<strong>$${mo}/mo for ${Math.ceil(price/mo)} months</strong>`:`<strong>Pay now</strong>`;
  document.getElementById('ov').classList.add('on');
  document.getElementById('sh').classList.add('on');
}
function cs(){document.getElementById('ov').classList.remove('on');document.getElementById('sh').classList.remove('on');}

function confirmCurrent(){
  cs();
  if(currentCheckoutScene==='priceline'){confirmPriceline();}
  else if(currentCheckoutScene==='gemini'){confirmGemini();}
}

// ─── SCENE 1: PRICELINE ───
async function initScene1(){
  const c='pl-chat';
  dotsIn(c,'pl-style');await D(800);dotsOut(c);
  addTo(c,"Hi Amanda! I'm Penny, your Priceline travel assistant. I can help you find the perfect vacation package. Where are you headed?",'pl-msg bot');
  await D(300);
  pillsTo(c,["Orlando for 5 nights","Beach getaway","Weekend trip"],'pl-style','plTap');
}
async function plTap(t){
  const c='pl-chat';
  document.querySelectorAll('#pl-chat .pill-row').forEach(e=>e.remove());
  addTo(c,t,'pl-msg user');
  dotsIn(c,'pl-style');await D(1200);dotsOut(c);
  if(t.includes('Orlando')||t.includes('Book')||t.includes('book')){
    addTo(c,"Great choice! I found an excellent package for your Orlando trip:",'pl-msg bot');
    await D(400);
    const deal=document.createElement('div');deal.className='pl-deal';
    deal.innerHTML=`
      <div class="pl-deal-title">Orlando Vacation Package</div>
      <div class="pl-deal-row"><span class="pl-deal-label">Flights</span><span>2 round-trip, JFK &rarr; MCO</span></div>
      <div class="pl-deal-row"><span class="pl-deal-label">Hotel</span><span>Hilton Orlando, 5 nights</span></div>
      <div class="pl-deal-row"><span class="pl-deal-label">Dates</span><span>Jul 12 &ndash; Jul 17, 2026</span></div>
      <div class="pl-deal-row"><span class="pl-deal-label">Total</span><span style="font-weight:700;font-size:16px">$1,847</span></div>
      <div class="pl-affirm-offer" onclick="plCheckout()">
        <div class="pl-affirm-badge">
          <span class="pl-affirm-logo">affirm</span>
          <span class="pl-affirm-tag">0% APR</span>
        </div>
        <div class="pl-affirm-terms">$154/mo for 12 months</div>
        <div class="pl-affirm-sub">No interest. No fees. Pay over time with Affirm.</div>
      </div>`;
    document.getElementById(c).appendChild(deal);
    document.getElementById(c).scrollTop=99999;
    await D(400);
    addTo(c,"You're pre-approved with Affirm for this purchase at 0% APR. Tap the Affirm offer to book with monthly payments!",'pl-msg bot');
  } else {
    addTo(c,"Let me search for options. For the best deals, I'd recommend Orlando\u2014great parks, weather, and I can find packages with 0% financing through Affirm!",'pl-msg bot');
    await D(300);
    pillsTo(c,["Orlando for 5 nights","Tell me more"],'pl-style','plTap');
  }
}
function plCheckout(){
  currentCheckoutScene='priceline';
  openSheet('Orlando Vacation Package',1847,154);
}
async function confirmPriceline(){
  ppVal-=1847;
  await D(500);
  const c='pl-chat';
  const s=document.createElement('div');s.className='suc';
  s.innerHTML=`<div class="suc-t">&#10003; Booking confirmed!</div><div class="suc-b">Your Orlando trip is booked. $154/mo at 0% APR. Confirmation sent to your email.<br><br>Your Affirm purchasing power is now <strong>$${ppVal.toLocaleString()}</strong>.</div>`;
  document.getElementById(c).appendChild(s);
  document.getElementById(c).scrollTop=99999;
  await D(400);
  addTo(c,"Amazing! Your trip is set. Need help with anything else for Orlando? I can help with day passes, rental cars, or activities!",'pl-msg bot');
  await D(300);
  pillsTo(c,["Day passes for Adventure Kingdom","Rental car","Go to Gemini for more"],'pl-style','plTap2');
}
async function plTap2(t){
  if(t.includes('Gemini')){showScene(2);return;}
  const c='pl-chat';
  document.querySelectorAll('#pl-chat .pill-row').forEach(e=>e.remove());
  addTo(c,t,'pl-msg user');
  dotsIn(c,'pl-style');await D(800);dotsOut(c);
